name: gelion_app
description: "Gelion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.0
  google_fonts: ^6.3.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  file_picker: ^8.1.7
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/default_food.png
